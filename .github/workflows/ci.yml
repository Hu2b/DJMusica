name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend - lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Dependencies installeren
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit- en integratietests + coverage
        run: npm test

      - name: Testrapport bewaren (CI-artefact, zie testset.md §11.4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 90
