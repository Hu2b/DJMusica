name: CI

on:
  # Draai op elke push naar main...
  push:
    branches: [main]
  # ...en op ELKE pull request, ongeacht naar welke branch hij samenvoegt.
  # Zo krijgt ook een pull request die (tijdelijk) op een andere feature-branch
  # is gericht meteen een eigen groen/rood vinkje met testrapport.
  pull_request:

jobs:
  test-backend:
    name: Backend - lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Dependencies installeren
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit- en integratietests + coverage + testrapport
        run: npm test

      - name: Testrapport bewaren (leesbaar HTML + machineleesbaar JUnit, zie testset.md §11.4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testrapport
          path: |
            backend/reports/testrapport.html
            backend/reports/testrapport-junit.xml
          retention-days: 90

      - name: Coverage-rapport bewaren (CI-artefact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage
          retention-days: 90
